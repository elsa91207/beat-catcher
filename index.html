<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>節奏捕手</title>
  <meta name="theme-color" content="#101114">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- iOS：Safari 不讀 manifest 的 display/icon，需要這些 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="節奏捕手">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #191b20;
      --ink: #f6f1e8;
      --muted: #a5adba;
      --line: #2d3138;
      --cyan: #36d2d6;
      --lime: #b7ef5f;
      --coral: #ff6b66;
      --gold: #ffd166;
      --bg-a: #101114;
      --bg-b: #17181c;
      --bg-c: #0d0f12;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(54, 210, 214, 0.16), transparent 30%),
        radial-gradient(circle at 82% 74%, rgba(255, 209, 102, 0.12), transparent 28%),
        linear-gradient(145deg, var(--bg-a) 0%, var(--bg-b) 52%, var(--bg-c) 100%);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      border: 0;
      border-radius: 8px;
      color: #101114;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0;
    }

    .shell {
      width: min(1120px, calc(100vw - 28px));
      height: min(720px, calc(100vh - 28px));
      min-height: 560px;
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(18, 20, 24, 0.88);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.46);
      backdrop-filter: blur(16px);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 22px;
      overflow-y: auto;
      border-right: 1px solid var(--line);
      background: rgba(18, 20, 24, 0.72);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .record {
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
      border-radius: 50%;
      background:
        radial-gradient(circle, #101114 0 16%, var(--gold) 17% 23%, transparent 24%),
        conic-gradient(from 30deg, var(--cyan), var(--lime), var(--coral), var(--gold), var(--cyan));
      box-shadow: inset 0 0 0 8px rgba(16, 17, 20, 0.52), 0 0 26px rgba(54, 210, 214, 0.22);
    }

    .playing .record {
      animation: spin 1.8s linear infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      min-height: 78px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #15171b;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 0.77rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .value {
      display: block;
      margin-top: 5px;
      font-size: 1.85rem;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .meter {
      height: 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: #0e1013;
    }

    .meter > span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--coral), var(--gold), var(--lime));
      transition: width 140ms ease;
    }

    .track {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #15171b;
    }

    .track-select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: #22252b;
      color: var(--ink);
      font: inherit;
      font-weight: 800;
    }

    .track-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .track-name {
      overflow: hidden;
      font-size: 1.04rem;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track-bpm {
      flex: 0 0 auto;
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .file-input {
      width: 100%;
      min-height: 38px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #111318;
      color: var(--muted);
      font: inherit;
      font-size: 0.82rem;
    }

    .difficulty {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #15171b;
    }

    .difficulty-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .difficulty-btn {
      min-height: 36px;
      border: 1px solid var(--line);
      background: #22252b;
      color: var(--ink);
      font-size: 0.88rem;
    }

    .difficulty-btn.active {
      border-color: transparent;
      background: var(--lime);
      color: #101114;
    }

    .voice-toggle {
      min-height: 38px;
      border: 1px solid var(--line);
      background: #22252b;
      color: var(--ink);
    }

    .voice-toggle.active {
      border-color: transparent;
      background: var(--gold);
      color: #101114;
    }

    .controls {
      display: grid;
      gap: 10px;
      margin-top: auto;
    }

    .primary {
      min-height: 48px;
      background: var(--lime);
    }

    .ghost {
      min-height: 44px;
      border: 1px solid var(--line);
      background: #22252b;
      color: var(--ink);
    }

    .stage {
      position: relative;
      min-width: 0;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px) 0 0 / 72px 100%,
        linear-gradient(180deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 100% 58px,
        #0f1115;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(15, 17, 21, 0.08), rgba(15, 17, 21, 0.48));
    }

    .message {
      width: min(440px, 100%);
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(18, 20, 24, 0.9);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.36);
    }

    .message h2 {
      margin: 0 0 10px;
      font-size: clamp(1.45rem, 4vw, 2.1rem);
      letter-spacing: 0;
    }

    .message p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .follow-range {
      width: 100%;
      margin: 2px 0 0;
      accent-color: var(--lime);
      cursor: pointer;
      min-height: 32px;
    }

    .rank-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(6, 7, 9, 0.72);
      backdrop-filter: blur(6px);
    }

    .rank-card {
      width: min(460px, 100%);
      max-height: min(80vh, 640px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: #15171b;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
    }

    .rank-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rank-head h2 {
      margin: 0;
      font-size: 1.4rem;
    }

    .rank-close {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #22252b;
      color: var(--ink);
      font-size: 1rem;
    }

    .rank-me {
      display: grid;
      gap: 6px;
    }

    .rank-name {
      width: 100%;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101114;
      color: var(--ink);
      font: inherit;
    }

    .rank-list {
      flex: 1;
      overflow-y: auto;
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rank-list li {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #191b20;
    }

    .rank-list li.me {
      border-color: var(--lime);
      background: #1c2418;
    }

    .rank-pos {
      font-weight: 800;
      color: var(--muted);
    }

    .rank-list li:nth-child(1) .rank-pos { color: var(--gold); }
    .rank-list li:nth-child(2) .rank-pos { color: #d7dde6; }
    .rank-list li:nth-child(3) .rank-pos { color: var(--coral); }

    .rank-who {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .rank-meta {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
    }

    .rank-score {
      font-weight: 800;
      font-size: 1.1rem;
    }

    .rank-status {
      margin: 0;
      min-height: 1.2em;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .rank-refresh {
      min-height: 40px;
    }

    .hidden {
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 780px) {
      html,
      body {
        height: auto;
      }

      body {
        display: block;
        overflow: auto;
      }

      .shell {
        width: 100vw;
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        border: 0;
      }

      .stage {
        order: -1;
        height: 58vh;
        min-height: 340px;
      }

      .sidebar {
        padding: 14px;
        gap: 12px;
        overflow: visible;
        border-right: 0;
        border-top: 1px solid var(--line);
      }

      .brand {
        align-items: flex-start;
      }

      .record {
        width: 44px;
        height: 44px;
      }

      .stats {
        grid-template-columns: repeat(4, 1fr);
      }

      .stat {
        min-height: 58px;
        padding: 9px;
      }

      .value {
        font-size: 1.25rem;
      }

      .sub {
        display: none;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 520px) {
      .stats {
        grid-template-columns: 1fr 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell" id="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="record" aria-hidden="true"></div>
        <div>
          <h1>節奏捕手</h1>
      <p class="sub">三條音軌，一台小播放器，一首越跑越快的歌。<br><span id="buildTag" style="opacity:.6">build 2026-07-10-c</span></p>
        </div>
      </div>

      <section class="stats" aria-label="遊戲狀態">
        <div class="stat">
          <span class="label">分數</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="label">連擊</span>
          <span class="value" id="combo">0</span>
        </div>
        <div class="stat">
          <span class="label">最佳</span>
          <span class="value" id="best">0</span>
        </div>
        <div class="stat">
          <span class="label">速度</span>
          <span class="value" id="level">1</span>
        </div>
        <div class="stat">
          <span class="label">時間</span>
          <span class="value" id="timeLeft">0:00</span>
        </div>
      </section>

      <div class="meter" aria-label="血量">
        <span id="health"></span>
      </div>

      <section class="track" aria-label="目前曲目">
        <span class="label">曲目</span>
        <select class="track-select" id="trackSelect" aria-label="選擇歌曲"></select>
        <input class="file-input" id="audioFile" type="file" accept="audio/*" aria-label="載入本機歌曲音檔">
        <div class="track-row">
          <span class="track-name" id="trackName">小城夏天</span>
          <span class="track-bpm" id="trackBpm">112 BPM</span>
        </div>
      </section>

      <section class="difficulty" aria-label="難度">
        <span class="label">難度</span>
        <div class="difficulty-options">
          <button class="difficulty-btn active" data-difficulty="easy">初級</button>
          <button class="difficulty-btn" data-difficulty="normal">中級</button>
          <button class="difficulty-btn" data-difficulty="hard">高級</button>
        </div>
      </section>

      <section class="difficulty" aria-label="跟隨速度">
        <span class="label">跟隨速度 · <span id="followValue">4</span></span>
        <input class="follow-range" id="followRange" type="range" min="1" max="6" step="1" value="4" aria-label="手動跟隨速度 1 到 6（慢到快）">
      </section>

      <div class="controls">
        <button class="primary" id="startBtn">開始</button>
        <button class="ghost" id="pauseBtn">暫停</button>
        <button class="voice-toggle active" id="voiceBtn">人聲 ON</button>
        <button class="ghost" id="rankBtn">排行榜</button>
      </div>
    </aside>

    <section class="stage" aria-label="節奏捕手 遊戲區">
      <canvas id="game" width="900" height="720"></canvas>
      <div class="overlay" id="overlay">
        <div class="message">
          <h2 id="messageTitle">準備進歌</h2>
          <p id="messageText">曲目：小城夏天。按開始，讓第一顆音符落下。</p>
        </div>
      </div>
    </section>
  </main>

  <div class="rank-modal hidden" id="rankModal">
    <div class="rank-card">
      <div class="rank-head">
        <h2>排行榜</h2>
        <button class="rank-close" id="rankClose" aria-label="關閉">✕</button>
      </div>
      <div class="rank-me">
        <span class="label">你的名字</span>
        <input class="rank-name" id="rankName" type="text" maxlength="16" placeholder="輸入名字（會記住）">
      </div>
      <ol class="rank-list" id="rankList"></ol>
      <p class="rank-status" id="rankStatus"></p>
      <button class="ghost rank-refresh" id="rankRefresh">重新整理</button>
    </div>
  </div>

          "E5", "G#5", "B5", "C#6", "B5", "G#5", "E5", null,
          "C#5", "E5", "G#5", "A5", "G#5", "E5", "C#5", null
        ],
        bass: ["C#3", "C#3", "G#2", "G#2", "A2", "A2", "F#2", "G#2"],
        syllables: ["ya", "eh", "la", "ah", "ya", "mm", "oh", "eh"],
        lanes: [2, 1, 2, 0, 1, 2, 1, 0, 2, 2, 1, 0, 1, 2, 0, 1],
        palette: ["#ff6b66", "#ffd166", "#36d2d6"]
      },
      {
        title: "Old Town Road - Remix",
        artist: "Lil Nas X, Billy Ray Cyrus",
        duration: 157,
        bpm: 136,
        key: "G#",
        melody: [
          "G#4", "B4", "C#5", "E5", "C#5", "B4", "G#4", null,
          "F#4", "G#4", "B4", "C#5", "B4", "G#4", "F#4", null,
          "G#4", "B4", "E5", "F#5", "E5", "C#5", "B4", null,
          "F#4", "G#4", "B4", "C#5", "B4", "G#4", "F#4", null
        ],
        bass: ["G#2", "G#2", "B2", "B2", "C#3", "C#3", "E3", "F#3"],
        syllables: ["hey", "ya", "oh", "la", "hey", "mm", "ya", "oh"],
        lanes: [0, 1, 2, 1, 0, 1, 2, 1, 0, 0, 1, 2, 1, 0, 2, 1],
        palette: ["#ffd166", "#36d2d6", "#b7ef5f"]
      }
    ];
    const difficulties = {
      easy: {
        label: "初級",
        bpmScale: 0.78,
        startSpeed: 145,
        maxSpeed: 300,
        speedGain: 0.012,
        extraSpawnChance: 0.08,
        noiseBase: 0.025,
        noiseGain: 9000,
        noiseMax: 0.11
      },
      normal: {
        label: "中級",
        bpmScale: 0.9,
        startSpeed: 185,
        maxSpeed: 410,
        speedGain: 0.02,
        extraSpawnChance: 0.18,
        noiseBase: 0.05,
        noiseGain: 7600,
        noiseMax: 0.17
      },
      hard: {
        label: "高級",
        bpmScale: 1,
        startSpeed: 230,
        maxSpeed: 520,
        speedGain: 0.032,
        extraSpawnChance: 0.28,
        noiseBase: 0.08,
        noiseGain: 6200,
        noiseMax: 0.24
      }
    };

    let width = 900;
    let height = 720;
    let laneWidth = 150;
    let laneAreaWidth = 450;
    let laneOffset = 0;
    let playerLane = 1;
    let targetX = 450;
    let playerX = 450;
    let score = 0;
    let combo = 0;
    let maxCombo = 0;
    let best = Number(localStorage.getItem(bestKey) || 0);
    let health = 100;
    // 血量:滿血 100,碰迴旋鏢或漏接音符各扣 1/15,約 15 次失誤耗盡。
    const HIT_DAMAGE = 100 / 15;
    // 每首歌的遊戲時間統一約一分半。
    const GAME_DURATION = 90;
    let speed = 250;
    let spawnEvery = 730;
    let spawnTimer = 0;
    let lastTime = 0;
    let state = "ready";
    let audioCtx;
    let beatPulse = 0;
    let track = tracks[0];
    let difficultyKey = "easy";
    let difficulty = difficulties[difficultyKey];
    let vocalEnabled = true;
    let uploadedAudio;
    let uploadedAudioUrl;
    let uploadedTrackTitle = "";
    let songTimer = 0;
    let songStep = 0;
    let songElapsed = 0;
    let followLevel = 4;

    // 跟隨速度等級 1~6（慢→快）：每級 ×2.5 拉大級間差距；1 級很飄、6 級幾乎 1:1。
    function followEase() {
      return 2 * Math.pow(2.5, followLevel - 1);
    }

    bestEl.textContent = best;
    populateTrackSelect();
    updateTrackLabel();

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      width = Math.max(320, Math.floor(rect.width));
      height = Math.max(320, Math.floor(rect.height));
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      laneAreaWidth = Math.min(width, 420);
      laneOffset = (width - laneAreaWidth) / 2;
      laneWidth = laneAreaWidth / lanes;
      targetX = laneCenter(playerLane);
      playerX = targetX;
    }

    function laneCenter(lane) {
      return laneOffset + laneWidth * lane + laneWidth / 2;
    }

    function resetGame() {
      notes.length = 0;
      particles.length = 0;
      playerLane = 1;
      playerX = laneCenter(playerLane);
      targetX = playerX;
      score = 0;
      combo = 0;
      maxCombo = 0;
      health = 100;
      speed = difficulty.startSpeed;
      spawnEvery = 730;
      spawnTimer = 0;
      beatPulse = 0;
      songTimer = 0;
      songStep = 0;
      songElapsed = 0;
      lastSubmittedKey = "";
      resetUploadedAudio();
      updateHud();
    }

    function startGame() {
      if (state === "playing") return;
      if (state === "ready" || state === "gameover") {
        resetGame();
      }
      state = "playing";
      shell.classList.add("playing");
      overlay.classList.add("hidden");
      lastTime = performance.now();
      ensureAudio();
      playUploadedAudio();
      requestAnimationFrame(loop);
    }

    function pauseGame() {
      if (state !== "playing") return;
      state = "paused";
      shell.classList.remove("playing");
      pauseUploadedAudio();
      showMessage("暫停中", "按 Space 或開始繼續。節奏還在等你回來。");
    }

    function gameOver() {
      state = "gameover";
      shell.classList.remove("playing");
      pauseUploadedAudio();
      best = Math.max(best, score);
      localStorage.setItem(bestKey, String(best));
      updateHud();
      submitScore(score);
      showMessage("曲目結束", `分數 ${score}，最高連擊 ${maxCombo}。按開始再跑一首。`);
      playTone(96, 0.18, "sawtooth", 0.05);
    }

    function finishSong() {
      state = "gameover";
      shell.classList.remove("playing");
      pauseUploadedAudio();
      best = Math.max(best, score);
      localStorage.setItem(bestKey, String(best));
      updateHud();
      submitScore(score);
      showMessage("歌曲完成", `${track.title} 完成！分數 ${score}，最高連擊 ${maxCombo}。`);
      playTone(523.25, 0.12, "sine", 0.04);
      setTimeout(() => playTone(659.25, 0.12, "sine", 0.035), 120);
      setTimeout(() => playTone(783.99, 0.2, "sine", 0.03), 240);
    }

    function showMessage(title, text) {
      messageTitle.textContent = title;
      messageText.textContent = text;
      overlay.classList.remove("hidden");
    }

    // === 線上排行榜 ===
    function leaderboardConfigured() {
      return typeof LEADERBOARD_URL === "string" && LEADERBOARD_URL.indexOf("http") === 0;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function submitScore(finalScore) {
      if (!leaderboardConfigured() || finalScore <= 0) return;
      const name = (playerName || "匿名").slice(0, 16);
      const key = `${name}:${finalScore}:${track.title}`;
      if (key === lastSubmittedKey) return; // 同一輪只送一次
      lastSubmittedKey = key;
      fetch(`${LEADERBOARD_URL}/scores.json`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name,
          score: finalScore,
          combo: maxCombo,
          difficulty: difficulty.label,
          track: uploadedTrackTitle || track.title,
          ts: Date.now()
        })
      }).catch(() => {});
    }

    function openLeaderboard() {
      rankName.value = playerName;
      rankModal.classList.remove("hidden");
      renderLeaderboard();
    }

    function closeLeaderboard() {
      rankModal.classList.add("hidden");
    }

    function renderLeaderboard() {
      if (!leaderboardConfigured()) {
        rankList.innerHTML = "";
        rankStatus.textContent = "尚未設定雲端排行榜（請把 Firebase 網址填入程式的 LEADERBOARD_URL）。";
        return;
      }
      rankStatus.textContent = "載入中…";
      rankList.innerHTML = "";
      fetch(`${LEADERBOARD_URL}/scores.json`)
        .then((res) => res.json())
        .then((data) => {
          const rows = data
            ? Object.values(data).filter((r) => r && typeof r.score === "number")
            : [];
          rows.sort((a, b) => b.score - a.score);
          const top = rows.slice(0, 30);
          if (!top.length) {
            rankStatus.textContent = "還沒有任何分數，快去玩一場！";
            return;
          }
          rankList.innerHTML = top.map((r, i) => {
            const mine = playerName && r.name === playerName;
            const when = r.ts ? new Date(r.ts).toLocaleDateString() : "";
            const meta = [r.difficulty, r.track, when].filter(Boolean).join(" · ");
            return `<li class="${mine ? "me" : ""}">`
              + `<span class="rank-pos">${i + 1}</span>`
              + `<span class="rank-who">${escapeHtml(r.name || "匿名")}<span class="rank-meta">${escapeHtml(meta)}</span></span>`
              + `<span class="rank-score">${r.score}</span></li>`;
          }).join("");
          rankStatus.textContent = `共 ${rows.length} 筆，顯示前 ${top.length} 名。`;
        })
        .catch(() => {
          rankStatus.textContent = "讀取失敗，請檢查網路或資料庫網址／規則。";
        });
    }

    function move(delta) {
      playerLane = Math.max(0, Math.min(lanes - 1, playerLane + delta));
      targetX = laneCenter(playerLane);
      beatPulse = 1;
    }

    // 讓接收器直接跟著手指/滑鼠的水平位置移動（拖曳操控）。
    // targetX 夾在整個軌道區寬度內（跨滿全寬跟手），playerLane 由位置推得以判定接音符。
    function moveTo(x) {
      const minX = laneOffset + laneWidth / 2;
      const maxX = laneOffset + laneAreaWidth - laneWidth / 2;
      targetX = Math.max(minX, Math.min(maxX, x));
      playerX = targetX; // 觸控/滑鼠直接 1:1 貼手，零延遲（不經緩動）
      playerLane = Math.max(0, Math.min(lanes - 1, Math.floor((targetX - laneOffset) / laneWidth)));
      beatPulse = 1;
    }

    function setDifficulty(nextKey) {
      difficultyKey = nextKey;
      difficulty = difficulties[difficultyKey];
      difficultyBtns.forEach((button) => {
        button.classList.toggle("active", button.dataset.difficulty === difficultyKey);
      });
      updateTrackLabel();

      if (state === "playing") {
        resetGame();
        lastTime = performance.now();
        showMessage(`${difficulty.label}模式`, "已用新難度重新開始。");
        overlay.classList.add("hidden");
      } else if (state === "ready" || state === "paused" || state === "gameover") {
        showMessage(`${difficulty.label}模式`, `曲目：${track.title}。按開始進歌。`);
        if (state === "paused") state = "ready";
        resetGame();
        draw();
      }
    }

    function setTrack(nextIndex) {
      track = tracks[nextIndex] || tracks[0];
      clearUploadedAudio();
      trackSelect.value = String(tracks.indexOf(track));
      updateTrackLabel();

      if (state === "playing") {
        resetGame();
        lastTime = performance.now();
        overlay.classList.add("hidden");
      } else {
        if (state === "paused") state = "ready";
        resetGame();
        showMessage("準備進歌", `曲目：${track.title}。按開始，讓第一顆音符落下。`);
        draw();
      }
    }

    function populateTrackSelect() {
      trackSelect.innerHTML = tracks.map((song, index) => {
        const label = `${song.title} - ${song.artist}`;
        return `<option value="${index}">${label}</option>`;
      }).join("");
      trackSelect.value = "0";
    }

    function updateTrackLabel() {
      const bpm = Math.round(track.bpm * difficulty.bpmScale);
      const duration = getSongDuration();
      trackNameEl.textContent = uploadedTrackTitle || track.artist;
      trackBpmEl.textContent = `${bpm} BPM · ${formatTime(duration)}`;
    }

    function getSongDuration() {
      return uploadedAudio?.duration && Number.isFinite(uploadedAudio.duration)
        ? uploadedAudio.duration
        : Math.min(track.duration, GAME_DURATION);
    }

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = Math.max(0, Math.floor(totalSeconds % 60));
      return `${minutes}:${String(seconds).padStart(2, "0")}`;
    }

    function loadUploadedAudio(file) {
      if (!file) return;
      clearUploadedAudio();
      uploadedAudioUrl = URL.createObjectURL(file);
      uploadedAudio = new Audio(uploadedAudioUrl);
      uploadedAudio.preload = "metadata";
      uploadedTrackTitle = `本機音檔：${file.name.replace(/\.[^.]+$/, "")}`;
      vocalEnabled = false;
      voiceBtn.classList.remove("active");
      voiceBtn.textContent = "人聲 OFF";
      uploadedAudio.addEventListener("loadedmetadata", () => {
        resetGame();
        updateTrackLabel();
        showMessage("原曲音檔已載入", `${file.name}。按開始會播放這個本機音檔。`);
        draw();
      });
      uploadedAudio.addEventListener("ended", () => {
        if (state === "playing") {
          songElapsed = getSongDuration();
          finishSong();
        }
      });
      updateTrackLabel();
    }

    function playUploadedAudio() {
      if (!uploadedAudio) return;
      uploadedAudio.currentTime = Math.min(songElapsed, Math.max(0, getSongDuration() - 0.1));
      uploadedAudio.play().catch(() => {
        showMessage("音檔還沒播放", "瀏覽器需要你再按一次開始，才能播放本機音檔。");
      });
    }

    function pauseUploadedAudio() {
      if (uploadedAudio) uploadedAudio.pause();
    }

    function resetUploadedAudio() {
      if (!uploadedAudio) return;
      uploadedAudio.pause();
      uploadedAudio.currentTime = 0;
    }

    function clearUploadedAudio() {
      if (uploadedAudio) {
        uploadedAudio.pause();
        uploadedAudio.removeAttribute("src");
      }
      if (uploadedAudioUrl) URL.revokeObjectURL(uploadedAudioUrl);
      uploadedAudio = null;
      uploadedAudioUrl = "";
      uploadedTrackTitle = "";
      audioFile.value = "";
    }

    function spawnNote(forcedLane, options = {}) {
      const lane = normalizeLane(forcedLane ?? chooseOpenLane());
      // 同一音軌同時只允許一顆音符,已有音符就不再生成。
      if (laneNoteCount(lane) >= 1) return false;

      const noiseChance = Math.min(
        difficulty.noiseMax,
        difficulty.noiseBase + score / difficulty.noiseGain
      );
      notes.push({
        lane,
        y: -36,
        radius: 18 + Math.random() * 7,
        kind: options.kind || (Math.random() < noiseChance ? "noise" : "note"),
        drift: (Math.random() - 0.5) * 18,
        hit: false
      });
      return true;
    }

    function normalizeLane(lane) {
      return Math.max(0, Math.min(lanes - 1, lane));
    }

    function laneNoteCount(lane) {
      return notes.filter((note) => note.lane === lane).length;
    }

    function chooseOpenLane(preferredLane) {
      const ranked = Array.from({ length: lanes }, (_, lane) => ({
        lane,
        score: laneNoteCount(lane) + (lane === preferredLane ? -0.35 : 0) + Math.random() * 0.2
      }));
      ranked.sort((a, b) => a.score - b.score);
      return ranked[0].lane;
    }

    function spawnNoteWave(step, preferredLane, hasMelody) {
      if (!hasMelody) {
        if (step % 16 === 14) spawnNote(chooseOpenLane(preferredLane), { kind: "note" });
        return;
      }

      const phraseRest = step % 16 === 7 || step % 16 === 15;
      const offbeatRest = difficultyKey === "easy" && step % 2 === 1;
      if (phraseRest || offbeatRest) {
        return;
      }

      const primaryLane = chooseOpenLane(preferredLane);
      spawnNote(primaryLane, { kind: "note" });

      const shouldAddHarmony = step % 16 === 4 || step % 16 === 12;
      const shouldAddPickup = step % 24 === 10 && difficultyKey === "hard";
      if (shouldAddHarmony || shouldAddPickup) {
        const secondLane = chooseOpenLane((primaryLane + 1 + (step % 2)) % lanes);
        if (secondLane !== primaryLane) spawnNote(secondLane, { kind: "note" });
      }

      if (step % 32 === 22 && difficultyKey === "hard") {
        const noiseLane = chooseOpenLane((primaryLane + 2) % lanes);
        if (noiseLane !== primaryLane) spawnNote(noiseLane, { kind: "noise" });
      }
    }

    function updateSong(seconds) {
      const stepLength = 60 / (track.bpm * difficulty.bpmScale) / 2;
      songTimer += seconds;

      while (songTimer >= stepLength) {
        songTimer -= stepLength;
        playSongStep(songStep);

        const lanePattern = track.lanes[songStep % track.lanes.length];
        const hasMelody = track.melody[songStep % track.melody.length];
        spawnNoteWave(songStep, lanePattern, hasMelody);

        songStep += 1;
      }
    }

    function update(dt) {
      const seconds = dt / 1000;
      songElapsed += seconds;
      spawnTimer += dt;
      speed = Math.min(difficulty.maxSpeed, difficulty.startSpeed + score * difficulty.speedGain);
      spawnEvery = Math.max(480, 900 - score * 0.018);
      beatPulse = Math.max(0, beatPulse - seconds * 4);
      updateSong(seconds);

      while (spawnTimer > spawnEvery) {
        spawnTimer -= spawnEvery;
        if (Math.random() < difficulty.extraSpawnChance) spawnNote(chooseOpenLane());
      }

      playerX += (targetX - playerX) * Math.min(1, seconds * followEase());

      for (let i = notes.length - 1; i >= 0; i--) {
        const note = notes[i];
        note.y += speed * seconds;
        const catchY = height - 92;
        const inCatchZone = Math.abs(note.y - catchY) < 34;
        const sameLane = note.lane === playerLane;

        if (inCatchZone && sameLane && !note.hit) {
          note.hit = true;
          notes.splice(i, 1);
          if (note.kind === "noise") {
            combo = 0;
            health -= HIT_DAMAGE;
            burst(laneCenter(note.lane), catchY, "#ff6b66", 15);
            playTone(130, 0.07, "square", 0.04);
          } else {
            combo += 1;
            maxCombo = Math.max(maxCombo, combo);
            score += 100 + combo * 8;
            burst(laneCenter(note.lane), catchY, colors[note.lane], 18);
            playTone(360 + note.lane * 90 + Math.min(combo, 20) * 6, 0.06, "sine", 0.035);
          }
          beatPulse = 1;
          updateHud();
        } else if (note.y > height + 44) {
          notes.splice(i, 1);
          if (note.kind === "note") {
            combo = 0;
            health -= HIT_DAMAGE;
            updateHud();
          }
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * seconds;
        p.y += p.vy * seconds;
        p.life -= seconds;
        if (p.life <= 0) particles.splice(i, 1);
      }

      const duration = getSongDuration();
      if (songElapsed >= duration) {
        songElapsed = duration;
        updateHud();
        finishSong();
      } else if (health <= 0) {
        health = 0;
        updateHud();
        gameOver();
      } else {
        updateHud();
      }
    }

    function burst(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const power = 80 + Math.random() * 210;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * power,
          vy: Math.sin(angle) * power,
          color,
          life: 0.28 + Math.random() * 0.38,
          size: 2 + Math.random() * 4
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      drawBackground();
      drawLanes();
      drawNotes();
      drawPlayer();
      drawParticles();
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, "#111319");
      gradient.addColorStop(1, "#0b0d10");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      ctx.globalAlpha = 0.25 + beatPulse * 0.16;
      ctx.fillStyle = "#36d2d6";
      ctx.fillRect(laneOffset, height - 116, laneAreaWidth, 2);
      ctx.globalAlpha = 1;
    }

    function drawLanes() {
      for (let i = 0; i < lanes; i++) {
        const x = laneOffset + i * laneWidth;
        ctx.fillStyle = i === playerLane ? "rgba(255,255,255,0.055)" : "rgba(255,255,255,0.018)";
        ctx.fillRect(x, 0, laneWidth, height);

        ctx.strokeStyle = "rgba(255,255,255,0.09)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255,255,255,0.09)";
      ctx.beginPath();
      ctx.moveTo(laneOffset + laneAreaWidth, 0);
      ctx.lineTo(laneOffset + laneAreaWidth, height);
      ctx.stroke();
    }

    function drawNotes() {
      for (const note of notes) {
        const x = laneCenter(note.lane) + Math.sin(note.y * 0.018) * note.drift;
        if (note.kind === "noise") {
          drawNoise(x, note.y, note.radius);
        } else {
          drawDisc(x, note.y, note.radius, colors[note.lane]);
        }
      }
    }

    function drawDisc(x, y, r, color) {
      const glow = ctx.createRadialGradient(x, y, 3, x, y, r * 2.7);
      glow.addColorStop(0, color);
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(x, y, r * 2.7, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#101114";
      ctx.beginPath();
      ctx.arc(x, y, r * 0.33, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawNoise(x, y, r) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(y * 0.035);
      ctx.fillStyle = "#ff6b66";
      ctx.strokeStyle = "#ffd166";
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 / 8) * i;
        const rr = i % 2 ? r * 0.55 : r * 1.18;
        const px = Math.cos(angle) * rr;
        const py = Math.sin(angle) * rr;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawPlayer() {
      const y = height - 92;
      const scale = 1 + beatPulse * 0.08;
      ctx.save();
      ctx.translate(playerX, y);
      ctx.scale(scale, scale);

      ctx.fillStyle = "rgba(54, 210, 214, 0.2)";
      ctx.beginPath();
      ctx.ellipse(0, 34, 70, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#f6f1e8";
      roundRect(-42, -18, 84, 44, 8);
      ctx.fill();

      ctx.fillStyle = "#101114";
      roundRect(-25, -7, 50, 22, 6);
      ctx.fill();

      ctx.fillStyle = colors[playerLane];
      ctx.beginPath();
      ctx.arc(0, 4, 7, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life * 2.4);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function updateHud() {
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      bestEl.textContent = Math.max(best, score);
      timeLeftEl.textContent = formatTime(getSongDuration() - songElapsed);
      levelEl.textContent = Math.max(
        1,
        Math.floor((speed - difficulty.startSpeed) / 55) + 1
      );
      healthEl.style.width = `${Math.max(0, health)}%`;
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function playSongStep(step) {
      if (!audioCtx) return;
      if (uploadedAudio) return;

      const melodyNote = track.melody[step % track.melody.length];
      const bassNote = track.bass[Math.floor(step / 4) % track.bass.length];
      const syllable = track.syllables[step % track.syllables.length];

      if (step % 2 === 0) playKick();
      if (step % 4 === 2) playHat();
      if (step % 8 === 4) playClap();

      if (bassNote && step % 4 === 0) {
        playTone(noteToFrequency(bassNote), 0.22, "triangle", 0.045);
      }

      if (melodyNote) {
        const melodyFrequency = noteToFrequency(melodyNote);
        const longTone = step % 8 === 0 || step % 16 === 6;
        playTone(melodyFrequency, longTone ? 0.28 : 0.12, "sine", 0.018);
        if (vocalEnabled && (longTone || step % 2 === 0)) playVocal(melodyFrequency, syllable, step, longTone);
        if (step % 8 === 0) {
          playTone(melodyFrequency * 1.5, 0.12, "triangle", 0.014);
        }
      }
    }

    function noteToFrequency(note) {
      const match = /^([A-G])(#?)(\d)$/.exec(note);
      if (!match) return 440;
      const noteIndex = {
        C: 0,
        D: 2,
        E: 4,
        F: 5,
        G: 7,
        A: 9,
        B: 11
      }[match[1]] + (match[2] ? 1 : 0);
      const octave = Number(match[3]);
      const midi = 12 * (octave + 1) + noteIndex;
      return 440 * 2 ** ((midi - 69) / 12);
    }

    function playTone(frequency, duration, type, volume) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = frequency;
      osc.type = type;
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playVocal(frequency, syllable, step, longTone = false) {
      if (!audioCtx) return;

      const vowel = vowelForSyllable(syllable);
      const now = audioCtx.currentTime;
      const duration = longTone ? 0.62 : (step % 4 === 0 ? 0.38 : 0.24);
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const formantA = audioCtx.createBiquadFilter();
      const formantB = audioCtx.createBiquadFilter();
      const tone = audioCtx.createBiquadFilter();

      osc.type = step % 3 === 0 ? "triangle" : "sawtooth";
      osc.frequency.setValueAtTime(frequency * 0.5, now);
      osc.frequency.linearRampToValueAtTime(frequency * 0.5 * (longTone ? 1.02 : 1.006), now + duration * 0.45);

      formantA.type = "bandpass";
      formantA.frequency.value = vowel[0];
      formantA.Q.value = 8;

      formantB.type = "bandpass";
      formantB.frequency.value = vowel[1];
      formantB.Q.value = 10;

      tone.type = "lowpass";
      tone.frequency.value = 2200;

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(longTone ? 0.042 : 0.03, now + 0.045);
      if (longTone) gain.gain.setValueAtTime(0.032, now + duration * 0.72);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

      osc.connect(formantA);
      osc.connect(formantB);
      formantA.connect(tone);
      formantB.connect(tone);
      tone.connect(gain).connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function vowelForSyllable(syllable) {
      if (syllable.includes("ee") || syllable.includes("i")) return [320, 2800];
      if (syllable.includes("eh") || syllable.includes("e")) return [520, 2300];
      if (syllable.includes("oh") || syllable.includes("o")) return [570, 900];
      if (syllable.includes("uh") || syllable.includes("mm")) return [430, 1200];
      return [760, 1400];
    }

    function playKick() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(120, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(48, audioCtx.currentTime + 0.12);
      gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.13);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.14);
    }

    function playHat() {
      if (!audioCtx) return;
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      }
      const source = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = "highpass";
      filter.frequency.value = 5200;
      gain.gain.value = 0.018;
      source.buffer = buffer;
      source.connect(filter).connect(gain).connect(audioCtx.destination);
      source.start();
    }

    function playClap() {
      if (!audioCtx) return;
      playTone(220, 0.035, "square", 0.018);
      setTimeout(() => playTone(260, 0.035, "square", 0.014), 28);
    }

    function loop(now) {
      if (state !== "playing") return;
      const dt = Math.min(34, now - lastTime);
      lastTime = now;
      update(dt);
      draw();
      if (state === "playing") requestAnimationFrame(loop);
    }

    window.addEventListener("resize", () => {
      resize();
      draw();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") {
        move(-1);
      }
      if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") {
        move(1);
      }
      if (event.code === "Space") {
        event.preventDefault();
        if (state === "playing") pauseGame();
        else startGame();
      }
    });

    function pointerX(event) {
      const rect = canvas.getBoundingClientRect();
      return event.clientX - rect.left;
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (state !== "playing") {
        startGame();
        return;
      }
      // 手指按到哪就先跟過去；並抓住指標，即使移出畫布也持續跟隨。
      if (canvas.setPointerCapture) canvas.setPointerCapture(event.pointerId);
      moveTo(pointerX(event));
    });

    // 只要在遊戲區移動，接收器就直接跟著手指/滑鼠位置走（免按住）。
    canvas.addEventListener("pointermove", (event) => {
      if (state !== "playing") return;
      moveTo(pointerX(event));
    });

    startBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", () => {
      if (state === "playing") pauseGame();
      else startGame();
    });
    voiceBtn.addEventListener("click", () => {
      vocalEnabled = !vocalEnabled;
      voiceBtn.classList.toggle("active", vocalEnabled);
      voiceBtn.textContent = vocalEnabled ? "人聲 ON" : "人聲 OFF";
    });
    audioFile.addEventListener("change", () => loadUploadedAudio(audioFile.files[0]));
    difficultyBtns.forEach((button) => {
      button.addEventListener("click", () => setDifficulty(button.dataset.difficulty));
    });
    trackSelect.addEventListener("change", () => setTrack(Number(trackSelect.value)));
    followRange.addEventListener("input", () => {
      followLevel = Number(followRange.value);
      followValue.textContent = followLevel;
    });
    rankBtn.addEventListener("click", openLeaderboard);
    rankClose.addEventListener("click", closeLeaderboard);
    rankRefresh.addEventListener("click", renderLeaderboard);
    rankModal.addEventListener("click", (event) => {
      if (event.target === rankModal) closeLeaderboard();
    });
    rankName.addEventListener("input", () => {
      playerName = rankName.value.trim().slice(0, 16);
      localStorage.setItem(nameKey, playerName);
    });

    resize();
    updateHud();
    draw();

    // PWA：註冊 Service Worker 以支援安裝與離線遊玩（與遊戲邏輯無耦合）
    if ("serviceWorker" in navigator) {
      // 已有控制權的頁面才在新版接手時自動重載（避免首次安裝就重整）。
      const hadController = !!navigator.serviceWorker.controller;
      let refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (!hadController || refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then((reg) => {
          // 定期檢查新版；有更新時 SW 會自動 skipWaiting → claim → 觸發重載。
          reg.update();
          setInterval(() => reg.update(), 60 * 60 * 1000);
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
